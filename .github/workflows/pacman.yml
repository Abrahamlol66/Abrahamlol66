name: Generate Pacman Game

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate Pacman Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Abrahamlol66
          outputs: |
            dist/pacman.svg
            dist/pacman-dark.svg?palette=github-dark&color_snake=#FFD700&color_dots=#00FF00

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
